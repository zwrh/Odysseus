// Builds a Ghidra Extension for headless MCP server.
//
// Requires GHIDRA_INSTALL_DIR environment variable:
//     > export GHIDRA_INSTALL_DIR=/path/to/ghidra
//     > gradle buildExtension

//----------------------START "DO NOT MODIFY" SECTION------------------------------
def ghidraInstallDir

if (System.env.GHIDRA_INSTALL_DIR) {
	ghidraInstallDir = System.env.GHIDRA_INSTALL_DIR
}
else if (project.hasProperty("GHIDRA_INSTALL_DIR")) {
	ghidraInstallDir = project.getProperty("GHIDRA_INSTALL_DIR")
}
else {
	throw new GradleException("GHIDRA_INSTALL_DIR is not set. Please set it as an environment variable or Gradle project property.")
}

task distributeExtension {
	group "Ghidra"

	apply from: new File(ghidraInstallDir).getCanonicalPath() + "/support/buildExtension.gradle"
	dependsOn ':buildExtension'
}
//----------------------END "DO NOT MODIFY" SECTION-------------------------------

task install(type: Exec) {
    dependsOn buildExtension

    group = "Installation"
    description = "Installs the extension to Ghidra's extension directory"

    workingDir ghidraInstallDir + '/Ghidra/Extensions'
    commandLine 'unzip', '-o', "${buildExtension.destinationDirectory.getAsFile().get().getAbsolutePath()}/${buildExtension.archiveBaseName.get()}.${buildExtension.archiveExtension.get()}"

    doLast {
        logger.quiet("Installed Argos MCP Headless Extension")
    }
}

sourceSets {
	main {
		java {
			srcDirs = ['java']
		}
	}
}

configurations {
	// Force Jackson 2.21.x to be compatible with MCP SDK
	all {
		resolutionStrategy {
			force 'com.fasterxml.jackson.core:jackson-core:2.21.1'
			force 'com.fasterxml.jackson.core:jackson-databind:2.21.1'
			force 'com.fasterxml.jackson.core:jackson-annotations:2.21'
			force 'com.fasterxml.jackson.dataformat:jackson-dataformat-yaml:2.21.2'
		}
	}
}

repositories {
	mavenCentral()
	maven { url 'https://repo.spring.io/milestone' }
	maven { url 'https://repo.spring.io/snapshot' }
	maven {
		name = 'Central Portal Snapshots'
		url = 'https://central.sonatype.com/repository/maven-snapshots/'
	}
}

dependencies {
	// MCP SDK dependencies
	implementation platform("io.modelcontextprotocol.sdk:mcp-bom:1.1.1")
	implementation "io.modelcontextprotocol.sdk:mcp-core"
	implementation "io.modelcontextprotocol.sdk:mcp-json-jackson2"
	implementation "jakarta.servlet:jakarta.servlet-api:6.1.0"

	// Jetty for embedded servlet support
	implementation "org.eclipse.jetty:jetty-server:12.1.7"
	implementation "org.eclipse.jetty.ee10:jetty-ee10-servlet:12.1.7"

	// Force Jackson 2.21.x for MCP SDK compatibility
	implementation "com.fasterxml.jackson.core:jackson-core:2.21.1"
	implementation "com.fasterxml.jackson.core:jackson-databind:2.21.1"
	implementation "com.fasterxml.jackson.core:jackson-annotations:2.21"
}
