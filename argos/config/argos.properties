# Argos MCP Server Configuration
# Copy this file and modify as needed

# Server settings
argos.server.options.server.port=8080
argos.server.options.server.host=0.0.0.0
argos.server.options.server.enabled=true

# Security - Enable for production use
argos.server.options.api.key.authentication.enabled=false
argos.server.options.api.key=

# Performance tuning
argos.server.options.debug.mode=false
argos.server.options.max.decompiler.search.functions=1000
argos.server.options.decompiler.timeout.seconds=10
argos.server.options.import.analysis.timeout.seconds=600
